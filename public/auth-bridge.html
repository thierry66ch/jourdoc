<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>JourDoc — auth bridge</title>
</head>
<body>
<script>
  // Pont JWT cross-origin du Clipper.
  // Tourne dans une iframe cachée hébergée sur jourdoc.pogil.ch, injectée par le
  // bookmarklet sur n'importe quelle page tierce. Son SEUL rôle : lire/écrire le
  // JWT dans le localStorage de cette origine et le transmettre par postMessage.
  //
  // Sécurité : on ne peut pas restreindre l'origine appelante (le bookmarklet
  // tourne sur des domaines tiers arbitraires). La sécurité repose sur le fait que
  // ce bridge ne fait QUE lire/écrire le token, et que /api/clip valide le JWT
  // côté serveur. Clé localStorage = "token" (cf. AuthContext.jsx).
  var KEY = 'token';

  window.addEventListener('message', function (e) {
    var msg = e.data;

    if (msg === 'GET_TOKEN') {
      var token = null;
      try { token = localStorage.getItem(KEY); } catch (_) {}
      e.source.postMessage({ type: 'TOKEN', token: token }, '*');
      return;
    }

    if (msg && msg.type === 'SET_TOKEN') {
      try { localStorage.setItem(KEY, msg.token); } catch (_) {}
      e.source.postMessage({ type: 'TOKEN_SET', ok: true }, '*');
      return;
    }

    if (msg === 'CLEAR_TOKEN') {
      try { localStorage.removeItem(KEY); } catch (_) {}
      e.source.postMessage({ type: 'TOKEN_CLEARED', ok: true }, '*');
      return;
    }
  });

  // Signale au parent que le bridge est prêt (au cas où il veut attendre).
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'BRIDGE_READY' }, '*');
  }
</script>
</body>
</html>
